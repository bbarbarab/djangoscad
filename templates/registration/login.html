<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <title>Login - Scadenzario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .box {
            background: white;
            padding: 28px;
            border-radius: 12px;
            box-shadow: 0 2px 10px rgba(0,0,0,.08);
            width: 100%;
            max-width: 380px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #1f4e78;
        }

        label {
            display: block;
            margin-top: 14px;
            margin-bottom: 6px;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        button {
            margin-top: 18px;
            width: 100%;
            padding: 10px;
            background: #1f4e78;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .errorlist {
            color: #a94442;
            padding-left: 18px;
        }

        .small {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Scadenzario</h1>
        <p class="small">Accedi per vedere dashboard e scadenze.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.non_field_errors }}

            <label for="{{ form.username.id_for_label }}">Username</label>
            {{ form.username }}

            <label for="{{ form.password.id_for_label }}">Password</label>
            {{ form.password }}

            <button type="submit">Entra</button>
        </form>
    </div>
</body>
</html>
